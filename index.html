<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はじめ日本語 - 완전 초급자를 위한 일본어 학습</title>
<style>
  :root{
    --color-bg:#FBF6EC;
    --color-blue:#BFE3F5;
    --color-blue-deep:#5B9BC4;
    --color-mint:#C9EEE0;
    --color-mint-deep:#4FAF93;
    --color-beige:#F2E4CB;
    --color-beige-deep:#D8B978;
    --color-coral:#FFC5B8;
    --color-coral-deep:#E27A63;
    --color-text:#463F52;
    --color-text-soft:#8A8398;
    --color-card:#FFFFFF;
    --radius-lg:22px;
    --radius-md:14px;
    --radius-sm:8px;
    --shadow-soft:0 10px 28px rgba(70,63,82,0.09);
    --shadow-press:0 2px 6px rgba(70,63,82,0.12);
    --font-jp:"Hiragino Maru Gothic ProN","Yu Gothic Medium","Hiragino Sans","Noto Sans JP",sans-serif;
    --font-ui:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 12% 8%, rgba(191,227,245,0.55) 0%, transparent 40%),
      radial-gradient(circle at 88% 92%, rgba(201,238,224,0.5) 0%, transparent 42%),
      var(--color-bg);
    min-height:100vh;
    font-family:var(--font-ui);
    color:var(--color-text);
    -webkit-font-smoothing:antialiased;
  }

  /* ===== Header ===== */
  header{
    position:sticky; top:0; z-index:50;
    backdrop-filter:blur(10px);
    background:rgba(251,246,236,0.86);
    border-bottom:1px solid rgba(70,63,82,0.06);
    padding:18px 20px 14px;
  }
  .brand{
    display:flex; align-items:center; justify-content:center; gap:10px;
    margin-bottom:16px;
  }
  .brand-mark{
    font-size:26px;
    display:inline-flex; align-items:center; justify-content:center;
    width:42px; height:42px;
    background:linear-gradient(135deg,var(--color-blue),var(--color-mint));
    border-radius:14px;
    box-shadow:var(--shadow-soft);
  }
  .brand h1{
    font-size:20px; margin:0; letter-spacing:.2px; font-weight:800;
  }
  .brand h1 span{
    font-family:var(--font-jp); font-weight:600; color:var(--color-blue-deep);
    margin-left:6px; font-size:16px;
  }

  nav.tabs{
    display:flex; gap:8px; max-width:640px; margin:0 auto;
    background:rgba(70,63,82,0.05);
    padding:5px; border-radius:999px;
  }
  nav.tabs button{
    flex:1;
    border:none; background:transparent; cursor:pointer;
    padding:10px 8px; border-radius:999px;
    font-family:var(--font-ui); font-size:13px; font-weight:700;
    color:var(--color-text-soft);
    transition:background .25s ease,color .25s ease, box-shadow .25s ease, transform .15s ease;
    white-space:nowrap;
  }
  nav.tabs button .num{
    display:inline-flex; align-items:center; justify-content:center;
    width:18px;height:18px;border-radius:50%;
    background:rgba(70,63,82,0.12);
    font-size:11px; margin-right:6px;
  }
  nav.tabs button.active{
    background:var(--color-card); color:var(--color-blue-deep);
    box-shadow:var(--shadow-soft);
  }
  nav.tabs button.active .num{ background:var(--color-blue); color:#fff; }
  nav.tabs button:active{ transform:scale(.97); }
  nav.tabs button:focus-visible{ outline:2px solid var(--color-blue-deep); outline-offset:2px; }

  main{
    max-width:640px; margin:0 auto; padding:26px 18px 70px;
  }
  .panel{ display:none; animation:fadeUp .4s ease; }
  .panel.active{ display:block; }
  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @media (prefers-reduced-motion: reduce){
    .panel{ animation:none; }
    *{ transition-duration:.01ms !important; animation-duration:.01ms !important; }
  }

  h2.section-title{
    font-size:15px; color:var(--color-text-soft); font-weight:700;
    margin:0 0 16px; display:flex; align-items:center; gap:8px;
  }
  h2.section-title::before{
    content:""; width:6px; height:6px; border-radius:50%;
    background:var(--color-mint-deep); display:inline-block;
  }

  /* ===== TAB 1: GAME ===== */
  .mode-toggle{
    display:flex; gap:8px; margin-bottom:20px;
  }
  .mode-toggle button{
    flex:1; padding:12px; border-radius:var(--radius-md);
    border:2px solid transparent; cursor:pointer;
    font-family:var(--font-ui); font-weight:800; font-size:14px;
    background:var(--color-card); color:var(--color-text-soft);
    box-shadow:var(--shadow-soft); transition:all .2s ease;
  }
  .mode-toggle button.active[data-mode="hiragana"]{
    border-color:var(--color-blue-deep); color:var(--color-blue-deep); background:#EAF6FC;
  }
  .mode-toggle button.active[data-mode="katakana"]{
    border-color:var(--color-mint-deep); color:var(--color-mint-deep); background:#E9F9F2;
  }
  .mode-toggle button:active{ transform:scale(.97); }

  .game-card{
    background:var(--color-card);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow-soft);
    padding:26px 22px 22px;
    position:relative;
    overflow:hidden;
  }
  .game-card::before{
    content:"";
    position:absolute; top:-30px; right:-26px;
    width:110px; height:44px;
    background:var(--color-beige);
    opacity:.7;
    transform:rotate(18deg);
    border-radius:4px;
    box-shadow:0 4px 10px rgba(0,0,0,0.06);
  }
  .progress-row{
    display:flex; justify-content:space-between; align-items:center;
    font-size:12.5px; color:var(--color-text-soft); font-weight:700;
    margin-bottom:18px;
  }
  .progress-track{
    flex:1; height:6px; background:rgba(70,63,82,0.08); border-radius:99px;
    margin:0 10px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:linear-gradient(90deg,var(--color-blue-deep),var(--color-mint-deep));
    border-radius:99px; transition:width .35s ease;
  }
  .char-display{
    text-align:center;
    font-family:var(--font-jp);
    font-size:96px;
    font-weight:600;
    color:var(--color-text);
    margin:6px 0 26px;
    line-height:1;
    user-select:none;
  }
  .options-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
  }
  .opt-btn{
    padding:16px 8px;
    border-radius:var(--radius-md);
    border:2px solid rgba(70,63,82,0.08);
    background:#FCFAF5;
    font-family:var(--font-ui); font-size:17px; font-weight:800;
    color:var(--color-text);
    cursor:pointer;
    transition:transform .12s ease, border-color .2s ease, background .2s ease, box-shadow .2s ease;
  }
  .opt-btn:hover:not(:disabled){ transform:translateY(-2px); box-shadow:var(--shadow-soft); }
  .opt-btn:active:not(:disabled){ transform:scale(.97); }
  .opt-btn:disabled{ cursor:default; }
  .opt-btn:focus-visible{ outline:2px solid var(--color-blue-deep); outline-offset:2px; }
  .opt-btn.correct{
    background:#E4F7EC; border-color:var(--color-mint-deep); color:#2E8A6C;
    animation:pop .3s ease;
  }
  .opt-btn.wrong{
    background:#FDEAE6; border-color:var(--color-coral-deep); color:#C4523C;
    animation:shake .3s ease;
  }
  @keyframes pop{ 0%{transform:scale(1)} 50%{transform:scale(1.06)} 100%{transform:scale(1)} }
  @keyframes shake{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

  .feedback-banner{
    text-align:center; font-weight:800; font-size:13.5px;
    height:20px; margin-top:16px; transition:opacity .2s ease;
    opacity:0;
  }
  .feedback-banner.show{ opacity:1; }
  .feedback-banner.correct-text{ color:var(--color-mint-deep); }
  .feedback-banner.wrong-text{ color:var(--color-coral-deep); }

  .result-card{ text-align:center; padding:20px 10px 6px; }
  .result-emoji{ font-size:56px; margin-bottom:8px; }
  .result-score{ font-size:38px; font-weight:900; color:var(--color-blue-deep); margin:6px 0; }
  .result-msg{ color:var(--color-text-soft); font-weight:600; margin-bottom:22px; font-size:14px; }
  .retry-btn{
    background:linear-gradient(135deg,var(--color-blue-deep),var(--color-mint-deep));
    color:#fff; border:none; padding:14px 30px; border-radius:999px;
    font-weight:800; font-size:14.5px; cursor:pointer; box-shadow:var(--shadow-soft);
    transition:transform .15s ease;
  }
  .retry-btn:active{ transform:scale(.96); }

  /* ===== TAB 2: SENTENCES ===== */
  .sentence-card{
    background:var(--color-card); border-radius:var(--radius-lg);
    box-shadow:var(--shadow-soft); padding:22px; margin-bottom:18px;
  }
  .sentence-tag{
    display:inline-block; font-size:11px; font-weight:800; letter-spacing:.4px;
    color:var(--color-blue-deep); background:#EAF6FC; padding:4px 10px;
    border-radius:99px; margin-bottom:12px;
  }
  .sentence-main{
    font-family:var(--font-jp); font-size:22px; line-height:2.3; color:var(--color-text);
  }
  .sentence-main ruby rt{
    font-size:11px; color:var(--color-blue-deep); font-weight:700;
  }
  .reveal-btn{
    margin-top:16px; width:100%; padding:11px; border-radius:var(--radius-md);
    border:1.5px dashed var(--color-beige-deep); background:#FBF4E4;
    color:#8A6A2E; font-weight:800; font-size:13px; cursor:pointer;
    transition:background .2s ease;
  }
  .reveal-btn:hover{ background:#F5ECD2; }
  .reveal-btn:active{ transform:scale(.98); }

  .accordion{
    display:grid; grid-template-rows:0fr;
    transition:grid-template-rows .4s ease;
  }
  .accordion.open{ grid-template-rows:1fr; }
  .accordion-inner{ overflow:hidden; }
  .accordion-body{ padding-top:16px; }

  .kana-line{
    font-family:var(--font-jp); font-size:16px; color:var(--color-mint-deep);
    background:#F0FAF5; padding:10px 12px; border-radius:var(--radius-sm);
    font-weight:600; letter-spacing:.5px;
  }
  .kr-line{
    margin-top:10px; font-size:14.5px; color:var(--color-text); font-weight:600;
    padding:10px 12px; background:#FBF6EC; border-radius:var(--radius-sm);
  }
  .vocab-box{ margin-top:12px; }
  .vocab-title{ font-size:11.5px; font-weight:800; color:var(--color-text-soft); margin-bottom:6px; }
  .vocab-item{
    display:flex; gap:6px; font-size:13px; padding:6px 2px; color:var(--color-text);
    border-bottom:1px dashed rgba(70,63,82,0.08);
  }
  .vocab-item:last-child{ border-bottom:none; }
  .vocab-jp{ font-family:var(--font-jp); font-weight:700; color:var(--color-blue-deep); min-width:64px; }

  /* ===== TAB 3: STORYBOOK ===== */
  .book{
    background:var(--color-card); border-radius:var(--radius-lg);
    box-shadow:var(--shadow-soft);
    padding:26px 24px 24px;
    position:relative;
    border-left:10px solid var(--color-beige);
  }
  .book::after{
    content:""; position:absolute; top:0; right:0;
    width:0; height:0;
    border-style:solid;
    border-width:0 26px 26px 0;
    border-color:transparent var(--color-bg) transparent transparent;
    filter:drop-shadow(-2px 2px 2px rgba(0,0,0,0.06));
  }
  .book-title{
    font-family:var(--font-jp); font-size:20px; font-weight:700; margin:0 0 4px;
    color:var(--color-text);
  }
  .book-title-kr{ font-size:12.5px; color:var(--color-text-soft); font-weight:700; margin-bottom:20px; }
  .story-line{ margin-bottom:18px; }
  .story-jp{
    font-family:var(--font-jp); font-size:19px; line-height:2.1; color:var(--color-text);
  }
  .story-jp ruby rt{ font-size:10px; color:var(--color-mint-deep); font-weight:700; }
  .story-kr{ font-size:13px; color:var(--color-text-soft); margin-top:4px; font-weight:600; }

  .quiz-block{
    margin-top:26px; padding-top:20px; border-top:1.5px dashed rgba(70,63,82,0.12);
  }
  .quiz-q{ font-size:14px; font-weight:800; margin-bottom:4px; }
  .quiz-q-kr{ font-size:12px; color:var(--color-text-soft); margin-bottom:12px; font-weight:600; }
  .quiz-options{
    display:flex; flex-direction:column; gap:8px; margin-bottom:24px;
  }
  .quiz-opt{
    text-align:left; padding:12px 14px; border-radius:var(--radius-md);
    border:2px solid rgba(70,63,82,0.08); background:#FCFAF5;
    font-family:var(--font-jp); font-size:14.5px; font-weight:600; cursor:pointer;
    transition:all .18s ease;
  }
  .quiz-opt:hover:not(:disabled){ border-color:var(--color-blue); }
  .quiz-opt:disabled{ cursor:default; }
  .quiz-opt.correct{ background:#E4F7EC; border-color:var(--color-mint-deep); color:#2E8A6C; }
  .quiz-opt.wrong{ background:#FDEAE6; border-color:var(--color-coral-deep); color:#C4523C; }
  .quiz-feedback{
    font-size:12.5px; font-weight:800; margin-top:-14px; margin-bottom:20px; min-height:16px;
  }
  .quiz-feedback.correct-text{ color:var(--color-mint-deep); }
  .quiz-feedback.wrong-text{ color:var(--color-coral-deep); }

  footer{
    text-align:center; font-size:11.5px; color:var(--color-text-soft);
    padding:20px; opacity:.7;
  }

  @media (max-width:420px){
    .char-display{ font-size:76px; }
    .brand h1{ font-size:17px; }
    .sentence-main, .story-jp{ font-size:17px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="brand-mark">🌸</span>
    <h1>하지메 일본어<span>はじめ日本語</span></h1>
  </div>
  <nav class="tabs" role="tablist" aria-label="학습 메뉴">
    <button class="tab-btn active" data-tab="game" role="tab" aria-selected="true"><span class="num">1</span>글자 게임</button>
    <button class="tab-btn" data-tab="sentence" role="tab" aria-selected="false"><span class="num">2</span>AI 일상문장</button>
    <button class="tab-btn" data-tab="story" role="tab" aria-selected="false"><span class="num">3</span>미니 동화책</button>
  </nav>
</header>

<main>

  <!-- ================= TAB 1 : GAME ================= -->
  <section class="panel active" id="panel-game">
    <h2 class="section-title">히라가나 · 가타카나 매칭 게임</h2>
    <div class="mode-toggle">
      <button data-mode="hiragana" class="active">あ 히라가나</button>
      <button data-mode="katakana">ア 가타카나</button>
    </div>

    <div class="game-card" id="gameCard">
      <!-- quiz view -->
      <div id="quizView">
        <div class="progress-row">
          <span id="qIndex">1 / 10</span>
          <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
          <span id="qScore">점수 0</span>
        </div>
        <div class="char-display" id="charDisplay">あ</div>
        <div class="options-grid" id="optionsGrid"></div>
        <div class="feedback-banner" id="feedbackBanner"></div>
      </div>

      <!-- result view -->
      <div class="result-card" id="resultView" style="display:none;">
        <div class="result-emoji" id="resultEmoji">🎉</div>
        <div class="result-score"><span id="finalScore">0</span> / 10</div>
        <div class="result-msg" id="resultMsg"></div>
        <button class="retry-btn" id="retryBtn">다시 하기</button>
      </div>
    </div>
  </section>

  <!-- ================= TAB 2 : SENTENCES ================= -->
  <section class="panel" id="panel-sentence">
    <h2 class="section-title">N5 · N4 일상문장 독해</h2>
    <div id="sentenceList"></div>
  </section>

  <!-- ================= TAB 3 : STORYBOOK ================= -->
  <section class="panel" id="panel-story">
    <h2 class="section-title">초급자용 미니 동화책</h2>
    <div class="book">
      <h3 class="book-title">ねこの はなし</h3>
      <div class="book-title-kr">고양이 이야기</div>
      <div id="storyLines"></div>

      <div class="quiz-block">
        <h2 class="section-title" style="margin-bottom:16px;">내용 확인 퀴즈</h2>
        <div id="storyQuiz"></div>
      </div>
    </div>
  </section>

</main>

<footer>매일 조금씩, 일본어와 친해지기 🌱</footer>

<script>
/* ============================================================
   공통: 탭 전환
============================================================ */
const tabBtns = document.querySelectorAll('.tab-btn');
const panels = { game:document.getElementById('panel-game'),
                  sentence:document.getElementById('panel-sentence'),
                  story:document.getElementById('panel-story') };

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>{ b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
    btn.classList.add('active'); btn.setAttribute('aria-selected','true');
    Object.values(panels).forEach(p=>p.classList.remove('active'));
    panels[btn.dataset.tab].classList.add('active');
  });
});

/* ============================================================
   TAB 1: 글자 매칭 게임
============================================================ */
const HIRAGANA = [
  {c:'あ',r:'a'},{c:'い',r:'i'},{c:'う',r:'u'},{c:'え',r:'e'},{c:'お',r:'o'},
  {c:'か',r:'ka'},{c:'き',r:'ki'},{c:'く',r:'ku'},{c:'け',r:'ke'},{c:'こ',r:'ko'},
  {c:'さ',r:'sa'},{c:'し',r:'shi'},{c:'す',r:'su'},{c:'せ',r:'se'},{c:'そ',r:'so'},
  {c:'た',r:'ta'},{c:'ち',r:'chi'},{c:'つ',r:'tsu'},{c:'て',r:'te'},{c:'と',r:'to'},
  {c:'な',r:'na'},{c:'に',r:'ni'},{c:'ぬ',r:'nu'},{c:'ね',r:'ne'},{c:'の',r:'no'},
  {c:'は',r:'ha'},{c:'ひ',r:'hi'},{c:'ふ',r:'fu'},{c:'へ',r:'he'},{c:'ほ',r:'ho'},
  {c:'ま',r:'ma'},{c:'み',r:'mi'},{c:'む',r:'mu'},{c:'め',r:'me'},{c:'も',r:'mo'},
  {c:'や',r:'ya'},{c:'ゆ',r:'yu'},{c:'よ',r:'yo'},
  {c:'ら',r:'ra'},{c:'り',r:'ri'},{c:'る',r:'ru'},{c:'れ',r:'re'},{c:'ろ',r:'ro'},
  {c:'わ',r:'wa'},{c:'を',r:'wo'},{c:'ん',r:'n'}
];
const KATAKANA = [
  {c:'ア',r:'a'},{c:'イ',r:'i'},{c:'ウ',r:'u'},{c:'エ',r:'e'},{c:'オ',r:'o'},
  {c:'カ',r:'ka'},{c:'キ',r:'ki'},{c:'ク',r:'ku'},{c:'ケ',r:'ke'},{c:'コ',r:'ko'},
  {c:'サ',r:'sa'},{c:'シ',r:'shi'},{c:'ス',r:'su'},{c:'セ',r:'se'},{c:'ソ',r:'so'},
  {c:'タ',r:'ta'},{c:'チ',r:'chi'},{c:'ツ',r:'tsu'},{c:'テ',r:'te'},{c:'ト',r:'to'},
  {c:'ナ',r:'na'},{c:'ニ',r:'ni'},{c:'ヌ',r:'nu'},{c:'ネ',r:'ne'},{c:'ノ',r:'no'},
  {c:'ハ',r:'ha'},{c:'ヒ',r:'hi'},{c:'フ',r:'fu'},{c:'ヘ',r:'he'},{c:'ホ',r:'ho'},
  {c:'マ',r:'ma'},{c:'ミ',r:'mi'},{c:'ム',r:'mu'},{c:'メ',r:'me'},{c:'モ',r:'mo'},
  {c:'ヤ',r:'ya'},{c:'ユ',r:'yu'},{c:'ヨ',r:'yo'},
  {c:'ラ',r:'ra'},{c:'リ',r:'ri'},{c:'ル',r:'ru'},{c:'レ',r:'re'},{c:'ロ',r:'ro'},
  {c:'ワ',r:'wa'},{c:'ヲ',r:'wo'},{c:'ン',r:'n'}
];

let gameMode = 'hiragana';
let questions = [];
let qIdx = 0;
let score = 0;
let answered = false;

const modeButtons = document.querySelectorAll('.mode-toggle button');
const quizView = document.getElementById('quizView');
const resultView = document.getElementById('resultView');
const charDisplay = document.getElementById('charDisplay');
const optionsGrid = document.getElementById('optionsGrid');
const qIndexEl = document.getElementById('qIndex');
const qScoreEl = document.getElementById('qScore');
const progressFill = document.getElementById('progressFill');
const feedbackBanner = document.getElementById('feedbackBanner');
const finalScoreEl = document.getElementById('finalScore');
const resultMsgEl = document.getElementById('resultMsg');
const resultEmojiEl = document.getElementById('resultEmoji');

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildQuestions(mode){
  const pool = mode === 'hiragana' ? HIRAGANA : KATAKANA;
  const chosen = shuffle(pool).slice(0,10);
  return chosen.map(item=>{
    const distractors = shuffle(pool.filter(p=>p.r!==item.r)).slice(0,3).map(p=>p.r);
    const options = shuffle([item.r, ...distractors]);
    return { char:item.c, answer:item.r, options };
  });
}

function startGame(mode){
  gameMode = mode;
  questions = buildQuestions(mode);
  qIdx = 0; score = 0; answered = false;
  quizView.style.display = 'block';
  resultView.style.display = 'none';
  renderQuestion();
}

function renderQuestion(){
  answered = false;
  const q = questions[qIdx];
  qIndexEl.textContent = `${qIdx+1} / 10`;
  qScoreEl.textContent = `점수 ${score}`;
  progressFill.style.width = `${((qIdx)/10)*100}%`;
  charDisplay.textContent = q.char;
  feedbackBanner.classList.remove('show','correct-text','wrong-text');
  feedbackBanner.textContent = '';

  optionsGrid.innerHTML = '';
  q.options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.addEventListener('click', ()=>handleAnswer(btn, opt, q.answer));
    optionsGrid.appendChild(btn);
  });
}

function handleAnswer(btn, chosen, correctAnswer){
  if(answered) return;
  answered = true;
  const allBtns = optionsGrid.querySelectorAll('.opt-btn');
  allBtns.forEach(b=>b.disabled = true);

  if(chosen === correctAnswer){
    btn.classList.add('correct');
    score++;
    feedbackBanner.textContent = '정답이에요! 🎉';
    feedbackBanner.classList.add('show','correct-text');
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b=>{ if(b.textContent === correctAnswer) b.classList.add('correct'); });
    feedbackBanner.textContent = `아쉬워요! 정답은 "${correctAnswer}"`;
    feedbackBanner.classList.add('show','wrong-text');
  }
  qScoreEl.textContent = `점수 ${score}`;
  progressFill.style.width = `${((qIdx+1)/10)*100}%`;

  setTimeout(()=>{
    qIdx++;
    if(qIdx < questions.length){
      renderQuestion();
    } else {
      showResult();
    }
  }, 950);
}

function showResult(){
  quizView.style.display = 'none';
  resultView.style.display = 'block';
  finalScoreEl.textContent = score;
  if(score >= 9){ resultEmojiEl.textContent='🏆'; resultMsgEl.textContent='완벽해요! 이 단계는 마스터하셨네요.'; }
  else if(score >= 7){ resultEmojiEl.textContent='🎉'; resultMsgEl.textContent='아주 잘했어요! 조금만 더 연습해봐요.'; }
  else if(score >= 4){ resultEmojiEl.textContent='💪'; resultMsgEl.textContent='좋은 시작이에요. 다시 도전해봐요!'; }
  else { resultEmojiEl.textContent='🌱'; resultMsgEl.textContent='천천히 하나씩 익혀봐요. 다시 해볼까요?'; }
}

  group.dataset.answered = 'true';

  const qi = Number(group.dataset.qi);
  const oi = Number(btn.dataset.oi);

  const feedback = document.getElementById(`qf-${qi}`);
  const allOpts = group.querySelectorAll('.quiz-opt');
  allOpts.forEach(o=>o.disabled = true);

  if(oi === item.answerIdx){
    btn.classList.add('correct');
    feedback.textContent = '정답입니다! ✅';
